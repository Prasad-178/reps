version: 2
project_name: reps

before:
  hooks:
    - go mod tidy

builds:
  - id: reps
    main: ./cmd/reps
    binary: reps
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    ignore:
      - goos: linux
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }}

archives:
  - id: reps
    name_template: "reps_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - docs/README.md
      - scripts/install-whisper.sh

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

brews:
  - name: reps
    homepage: "https://github.com/Prasad-178/reps"
    description: "Personalized, agentic interview rehearsal CLI"
    license: MIT
    repository:
      owner: Prasad-178
      name: homebrew-reps
    dependencies:
      - name: poppler
      - name: gh
    test: |
      system "#{bin}/reps", "--version"
    install: |
      bin.install "reps"
